<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>資料準備中 | AI建築サークル</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #111827;
      background: #f8fafc;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(100%, 560px);
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
    }
    p {
      color: #475569;
      line-height: 1.8;
      margin: 0 0 24px;
    }
    h1 {
      font-size: clamp(28px, 5vw, 40px);
      line-height: 1.2;
      margin: 0 0 16px;
      letter-spacing: 0;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 10px;
      background: #111827;
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>資料は現在準備中です</h1>
    <p>
      法改正対応やAI活用の最新情報は、AI建築サークル内の勉強会・会員向けコンテンツで順次共有しています。
      公開資料は内容が確定してから案内します。
    </p>
    <a href="/#pricing">サークル詳細を見る</a>
  </main>
</body>
</html>
